name: 1. Deploy Infra & App (Auto on Push)

# ============================================================
# This workflow runs automatically on every push to 'main'.
# 
# 1. It runs Terraform to create/update AWS resources.
# 2. It fetches the dynamic EC2 IP and RDS endpoint.
# 3. It SSHs into the EC2 instance and deploys the app.
# ============================================================

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger

jobs:
  deploy:
    name: Terraform Apply & Blue/Green Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- 1. AWS & TERRAFORM SETUP ---
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        working-directory: ./infra/terraform
        run: terraform init

      # --- 2. PROVISION INFRASTRUCTURE ---
      - name: Terraform Apply
        working-directory: ./infra/terraform
        run: terraform apply -auto-approve -no-color
        env:
          TF_VAR_key_pair_name: ${{ secrets.AWS_KEY_PAIR_NAME }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

      # --- 3. GET DYNAMIC OUTPUTS ---
      - name: Get Terraform Outputs
        id: tf_outputs
        working-directory: ./infra/terraform
        run: |
          echo "EC2_IP=$(terraform output -raw public_ip)" >> $GITHUB_ENV
          echo "RDS_ENDPOINT=$(terraform output -raw rds_endpoint)" >> $GITHUB_ENV

      # --- 4. WAIT FOR EC2 TO BOOT (Only matters on first run) ---
      - name: Wait for EC2 SSH to initialize
        run: sleep 30

      # --- 5. DEPLOY APPLICATION ---
      - name: Deploy Application to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ env.EC2_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            export DEBIAN_FRONTEND=noninteractive
            mkdir -p /home/ubuntu/app
            cd /home/ubuntu/app
            
            # Since the repo is private, we clone using your PAT
            if [ ! -d ".git" ]; then
                git init
                git remote add origin https://${{ secrets.GH_PAT }}@github.com/anuragstark/Roi-project.git
            fi
            
            git fetch origin main
            git reset --hard origin/main

            # ------------------------------------------------------------------
            # SOPS Decryption
            # ------------------------------------------------------------------
            # Temporarily write the age key to a file to decrypt the secrets
            echo "${{ secrets.SOPS_AGE_KEY }}" > /home/ubuntu/key.txt
            export SOPS_AGE_KEY_FILE=/home/ubuntu/key.txt
            
            # Install SOPS if not present
            if ! command -v sops &> /dev/null; then
              sudo wget -q -O /usr/local/bin/sops https://github.com/getsops/sops/releases/download/v3.8.1/sops-v3.8.1.linux.amd64
              sudo chmod +x /usr/local/bin/sops
            fi
            
            # Install age if not present
            if ! command -v age &> /dev/null; then
              sudo apt-get update -qq && sudo apt-get install -y -qq age
            fi
            
            # Decrypt the file from Git into the real .env file
            sops --decrypt --input-type dotenv --output-type dotenv .env.enc > .env
            
            # SECRETS CLEANUP: Delete the private key immediately!
            rm -f /home/ubuntu/key.txt
            
            # Strip any existing DATABASE_URL to prevent duplicates.
            sed -i '/DATABASE_URL/d' .env
            
            DB_PASS=$(echo "${{ secrets.DB_PASSWORD }}" | sed 's/#/%23/g')
            echo "DATABASE_URL=mysql://roi_admin:${DB_PASS}@${{ env.RDS_ENDPOINT }}/roi_platform" >> .env
            
            # Inject raw DB variables for the backup container
            echo "DB_HOST=${{ env.RDS_ENDPOINT }}" >> .env
            echo "DB_USER=roi_admin" >> .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "DB_NAME=roi_platform" >> .env
            
            # Inject AWS credentials
            echo "AWS_REGION=us-east-1" >> .env
            echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> .env
            echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> .env
            echo "AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}" >> .env
            
            # Ensure the global network exists
            docker network create roi_global_network || true
            
            # Check which app environment is currently active
            if docker ps --format '{{.Names}}' | grep -q "^roi_blue-backend-1$"; then
              ACTIVE_ENV="blue"
              IDLE_ENV="green"
              export BACKEND_PORT=5002
              export FRONTEND_PORT=3002
            else
              ACTIVE_ENV="green"
              IDLE_ENV="blue"
              export BACKEND_PORT=5000
              export FRONTEND_PORT=3000
            fi

            echo "Active Environment: $ACTIVE_ENV. Deploying new code to: $IDLE_ENV"
            
            # 1. Start Infrastructure Stack (Monitoring & Backups)
            docker compose --env-file .env -f docker-compose.infra.yml up -d --build
            
            # 2. Start new App Environment (Blue/Green)
            export COMPOSE_PROJECT_NAME="roi_$IDLE_ENV"
            docker compose --env-file .env -f docker-compose.yml up -d --build
            
            # 3. Wait for new Backend to become healthy (give it up to 200 seconds for TS compilation & DB push)
            echo "Waiting for new backend to become healthy on port $BACKEND_PORT..."
            for i in {1..100}; do
              if curl -s -f http://127.0.0.1:$BACKEND_PORT/api/health > /dev/null; then
                echo "New Backend is healthy!"
                break
              fi
              sleep 2
              if [ $i -eq 100 ]; then
                echo "Deployment failed backend health check! Pulling logs before rollback:"
                docker compose -f docker-compose.yml logs backend
                echo "Rolling back automatically."
                docker compose -f docker-compose.yml down
                exit 1
              fi
            done
            
            # Wait for new Frontend to become healthy
            echo "Waiting for new frontend to become healthy on port $FRONTEND_PORT..."
            for i in {1..30}; do
              if curl -s http://127.0.0.1:$FRONTEND_PORT > /dev/null; then
                echo "New Frontend is healthy!"
                break
              fi
              sleep 2
              if [ $i -eq 30 ]; then
                echo "Deployment failed frontend health check! Pulling logs before rollback:"
                docker compose -f docker-compose.yml logs frontend
                echo "Rolling back automatically."
                docker compose -f docker-compose.yml down
                exit 1
              fi
            done
            
            # 4. Configure Nginx (Install & Initial Copy)
            sudo apt-get install -y nginx > /dev/null 2>&1 || true
            if ! grep -q "managed by Certbot" /etc/nginx/sites-available/roi-platform 2>/dev/null; then
                sudo cp /home/ubuntu/app/nginx-proxy.conf /etc/nginx/sites-available/roi-platform
            fi
            sudo ln -sf /etc/nginx/sites-available/roi-platform /etc/nginx/sites-enabled/
            sudo rm -f /etc/nginx/sites-enabled/default
            
            # 5. Update Nginx Configuration to point to new ports (Zero Downtime Hot-Swap)
            sudo sed -i -E "s|proxy_pass http://127.0.0.1:3[0-9]+;|proxy_pass http://127.0.0.1:$FRONTEND_PORT;|g" /etc/nginx/sites-available/roi-platform
            sudo sed -i -E "s|proxy_pass http://127.0.0.1:5[0-9]+;|proxy_pass http://127.0.0.1:$BACKEND_PORT;|g" /etc/nginx/sites-available/roi-platform

            # 6. Hot Reload Nginx (Zero Downtime Traffic Swap)
            sudo nginx -t && sudo systemctl reload nginx
            
            # 7. Tear down old App Environment safely
            if [ "$ACTIVE_ENV" == "blue" ]; then
              export COMPOSE_PROJECT_NAME="roi_blue"
              docker compose -f docker-compose.yml down
            else
              if docker ps --format '{{.Names}}' | grep -q "^roi_green-backend-1$"; then
                export COMPOSE_PROJECT_NAME="roi_green"
                docker compose -f docker-compose.yml down
              fi
            fi

            # 8. Automate SSL Configuration (Certbot)
            if ! grep -q "managed by Certbot" /etc/nginx/sites-available/roi-platform 2>/dev/null; then
                echo "Running Certbot to configure HTTPS automatically..."
                sudo apt-get update -qq
                sudo apt-get install -y -qq certbot python3-certbot-nginx
                # We use --non-interactive and agree to terms to make it fully headless
                sudo certbot --nginx --non-interactive --agree-tos -m admin@paisatest.online -d paisatest.online -d www.paisatest.online --redirect || echo "Certbot failed (DNS might not be fully propagated), continuing..."
            else
                echo "SSL is already configured!"
            fi
