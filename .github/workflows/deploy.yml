name: 1. Deploy Infra & App (Auto on Push)

# This workflow runs Terraform, fetches outputs, and deploys the app to EC2 on 'main' push.

on:
  repository_dispatch:
    types: [trigger-deploy]
  workflow_dispatch: # Allows manual trigger

jobs:
  deploy:
    name: Terraform Apply & Blue/Green Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- 1. AWS & TERRAFORM SETUP ---
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./infra/terraform
        run: terraform init

      # --- 2. PROVISION INFRASTRUCTURE ---
      - name: Terraform Apply
        working-directory: ./infra/terraform
        run: terraform apply -auto-approve -no-color
        env:
          TF_VAR_key_pair_name: ${{ secrets.AWS_KEY_PAIR_NAME }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_gh_pat: ${{ secrets.GH_PAT }}

      # --- 3. GET DYNAMIC OUTPUTS ---
      - name: Get Terraform Outputs
        id: tf_outputs
        working-directory: ./infra/terraform
        run: |
          echo "WEB_PUBLIC_IP=$(terraform output -raw web_public_ip)" >> $GITHUB_ENV
          echo "MONITORING_PUBLIC_IP=$(terraform output -raw monitoring_public_ip)" >> $GITHUB_ENV
          echo "RDS_ENDPOINT=$(terraform output -raw rds_endpoint)" >> $GITHUB_ENV

      # --- 4. WAIT FOR EC2 TO BOOT ---
      - name: Wait for EC2 SSH to initialize
        run: |
          echo "Waiting for Web Server SSH..."
          WEB_READY=false
          for i in {1..90}; do
            if nc -z -w5 ${{ env.WEB_PUBLIC_IP }} 22; then
              echo "Web SSH is ready! (attempt $i)"
              WEB_READY=true
              break
            fi
            echo "Attempt $i/90 - not ready yet, sleeping 10s..."
            sleep 10
          done
          if [ "$WEB_READY" = false ]; then
            echo "Timeout waiting for Web Server SSH! The instance might have failed to boot."
            exit 1
          fi
          
          echo "Waiting for Monitoring Server SSH..."
          MON_READY=false
          for i in {1..90}; do
            if nc -z -w5 ${{ env.MONITORING_PUBLIC_IP }} 22; then
              echo "Monitoring SSH is ready! (attempt $i)"
              MON_READY=true
              break
            fi
            echo "Attempt $i/90 - not ready yet, sleeping 10s..."
            sleep 10
          done
          if [ "$MON_READY" = false ]; then
            echo "Timeout waiting for Monitoring Server SSH! The instance might have failed to boot."
            exit 1
          fi

      # --- 5. DEPLOY MONITORING SERVER ---
      - name: Deploy Monitoring to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ env.MONITORING_PUBLIC_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 30m
          command_timeout: 30m
          script: |
            mkdir -p /home/ubuntu/app
            cd /home/ubuntu/app
            
            # Wait for Docker to be ready (needed on fresh instances)
            echo "Waiting for Docker to be ready..."
            for i in {1..60}; do
              if command -v docker &> /dev/null && sudo docker info &> /dev/null; then
                echo "Docker is ready! (attempt $i)"
                break
              fi
              echo "Docker not ready yet (attempt $i/60), waiting 10s..."
              sleep 10
            done
            if ! command -v docker &> /dev/null; then
              echo "ERROR: Docker failed to install after 10 minutes!"
              exit 1
            fi
            
            # Clone/Pull repository
            if [ ! -d ".git" ]; then
                git init
                git remote add origin https://${{ secrets.GH_PAT }}@github.com/anuragstark/Roi-project.git
            fi
            git fetch origin main
            git reset --hard origin/main

            # Create minimal .env for monitoring stack
            echo "AWS_REGION=us-east-1" > .env
            echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> .env
            echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> .env
            echo "AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}" >> .env
            echo "DB_HOST=${{ env.RDS_ENDPOINT }}" >> .env
            echo "DB_USER=roi_admin" >> .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "DB_NAME=roi_platform" >> .env
            echo "DASHBOARD_USER=${{ secrets.DASHBOARD_USER }}" >> .env
            echo "DASHBOARD_PASS=${{ secrets.DASHBOARD_PASS }}" >> .env
            
            docker network create roi_global_network || true
            docker compose --env-file .env -f docker-compose.infra.yml up -d --build
            
            echo "Monitoring deployment complete!"
            sleep 2

      # --- 6. DEPLOY WEB SERVER ---
      - name: Deploy Application to Web EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ env.WEB_PUBLIC_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 30m
          command_timeout: 30m
          script: |
            export DEBIAN_FRONTEND=noninteractive
            mkdir -p /home/ubuntu/app
            cd /home/ubuntu/app
            
            # Wait for Docker to be ready (needed on fresh instances where user_data is still running)
            echo "Waiting for Docker to be ready..."
            for i in {1..60}; do
              if command -v docker &> /dev/null && sudo docker info &> /dev/null; then
                echo "Docker is ready! (attempt $i)"
                break
              fi
              echo "Docker not ready yet (attempt $i/60), waiting 10s..."
              sleep 10
            done
            if ! command -v docker &> /dev/null; then
              echo "ERROR: Docker failed to install after 10 minutes!"
              exit 1
            fi
            
            # Clone/Pull repository
            if [ ! -d ".git" ]; then
                git init
                git remote add origin https://${{ secrets.GH_PAT }}@github.com/anuragstark/Roi-project.git
            fi
            git fetch origin main
            git reset --hard origin/main

            # SOPS Decryption
            echo "${{ secrets.SOPS_AGE_KEY }}" > /home/ubuntu/key.txt
            export SOPS_AGE_KEY_FILE=/home/ubuntu/key.txt
            if ! command -v sops &> /dev/null; then
              sudo wget -q -O /usr/local/bin/sops https://github.com/getsops/sops/releases/download/v3.8.1/sops-v3.8.1.linux.amd64
              sudo chmod +x /usr/local/bin/sops
            fi
            if ! command -v age &> /dev/null; then
              sudo apt-get update -qq && sudo apt-get install -y -qq age
            fi
            sops --decrypt --input-type dotenv --output-type dotenv .env.enc > .env
            rm -f /home/ubuntu/key.txt
            
            # DB & AWS Configs
            sed -i '/DATABASE_URL/d' .env
            DB_PASS=$(echo "${{ secrets.DB_PASSWORD }}" | sed 's/#/%23/g')
            echo "DATABASE_URL=mysql://roi_admin:${DB_PASS}@${{ env.RDS_ENDPOINT }}/roi_platform" >> .env
            echo "AWS_REGION=us-east-1" >> .env
            echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> .env
            echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> .env
            echo "AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}" >> .env
            
            docker network create roi_global_network || true
            
            # Blue/Green logic
            if docker ps --format '{{.Names}}' | grep -q "^roi_blue-backend-1$"; then
              ACTIVE_ENV="blue"; IDLE_ENV="green"
              export BACKEND_PORT=5002; export FRONTEND_PORT=3002
            else
              ACTIVE_ENV="green"; IDLE_ENV="blue"
              export BACKEND_PORT=5000; export FRONTEND_PORT=3000
            fi

            export COMPOSE_PROJECT_NAME="roi_$IDLE_ENV"
            docker compose --env-file .env -f docker-compose.yml up -d --build
            
            # Health checks
            for i in {1..100}; do
              if curl -s -f http://127.0.0.1:$BACKEND_PORT/api/health > /dev/null; then break; fi
              sleep 2
              if [ $i -eq 100 ]; then docker compose -f docker-compose.yml down; exit 1; fi
            done
            for i in {1..30}; do
              if curl -s http://127.0.0.1:$FRONTEND_PORT > /dev/null; then break; fi
              sleep 2
              if [ $i -eq 30 ]; then docker compose -f docker-compose.yml down; exit 1; fi
            done
            
            # Nginx & htpasswd Setup
            sudo apt-get install -y nginx apache2-utils > /dev/null 2>&1 || true
            sudo htpasswd -b -c /etc/nginx/.htpasswd "${{ secrets.DASHBOARD_USER }}" "${{ secrets.DASHBOARD_PASS }}"
            
            sed -i "s/__MONITORING_PRIVATE_IP__/${{ env.MONITORING_PUBLIC_IP }}/g" /home/ubuntu/app/nginx-proxy.conf
            
            sudo cp /home/ubuntu/app/nginx-proxy.conf /etc/nginx/sites-available/roi-platform
            sudo ln -sf /etc/nginx/sites-available/roi-platform /etc/nginx/sites-enabled/
            sudo rm -f /etc/nginx/sites-enabled/default
            
            sudo sed -i -E "s|proxy_pass http://127.0.0.1:3[0-9]+;|proxy_pass http://127.0.0.1:$FRONTEND_PORT;|g" /etc/nginx/sites-available/roi-platform
            sudo sed -i -E "s|proxy_pass http://127.0.0.1:5[0-9]+;|proxy_pass http://127.0.0.1:$BACKEND_PORT;|g" /etc/nginx/sites-available/roi-platform

            sudo nginx -t && sudo systemctl reload nginx
            
            # Tear down old env
            if [ "$ACTIVE_ENV" == "blue" ]; then
              export COMPOSE_PROJECT_NAME="roi_blue"
              docker compose -f docker-compose.yml down || true
            else
              if docker ps --format '{{.Names}}' | grep -q "^roi_green-backend-1$"; then
                export COMPOSE_PROJECT_NAME="roi_green"
                docker compose -f docker-compose.yml down || true
              fi
            fi

            # SSL Configuration (run in background so it doesn't break SSH session)
            if ! grep -q "managed by Certbot" /etc/nginx/sites-available/roi-platform 2>/dev/null; then
                nohup bash -c '
                  export DEBIAN_FRONTEND=noninteractive
                  sudo apt-get update -qq
                  sudo apt-get install -y -qq certbot python3-certbot-nginx
                  sudo certbot --nginx --non-interactive --agree-tos -m admin@paisatest.online -d paisatest.online -d www.paisatest.online -d grafana.paisatest.online -d prometheus.paisatest.online --redirect || true
                ' > /home/ubuntu/certbot.log 2>&1 &
            fi
            
            echo "Deployment complete!"
            sleep 2
