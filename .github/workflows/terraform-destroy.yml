name: 3. Destroy Infrastructure (Run ONCE to Cleanup)

# Manual workflow to tear down the entire AWS infrastructure (EC2, RDS) to save costs via GitHub Actions.

on:
  workflow_dispatch: # Manual trigger only! You don't want this running automatically.

jobs:
  destroy:
    name: Terraform Destroy — Delete AWS Resources
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./infra/terraform
        run: terraform init

      - name: Terraform Destroy
        working-directory: ./infra/terraform
        run: terraform destroy -auto-approve
        env:
          TF_VAR_key_pair_name: ${{ secrets.AWS_KEY_PAIR_NAME }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_gh_pat: ${{ secrets.GH_PAT }}
