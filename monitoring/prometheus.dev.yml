global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: roi-platform-dev

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: roi-backend
    metrics_path: /api/metrics
    static_configs:
      # Dev backend container name
      - targets: ['roi_backend_dev:5000']

  - job_name: node-exporter
    static_configs:
      - targets: ['roi_node_exporter_dev:9100']
