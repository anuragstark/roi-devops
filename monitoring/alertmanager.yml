# Prometheus Alertmanager Configuration: Routes alerts to Discord webhook. Replace <DISCORD_WEBHOOK_URL> with actual URL.

global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'email'

  routes:
    - match:
        severity: critical
      receiver: 'email'
      repeat_interval: 12h

receivers:
  - name: 'email'
    email_configs:
      - to: 'anuragchauhan536@gmail.com'
        from: 'anuragchauhan536@gmail.com'
        smarthost: 'smtp.gmail.com:587'
        auth_username: 'anuragchauhan536@gmail.com'
        auth_password_file: '/etc/alertmanager/smtp_password'
        require_tls: true
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
