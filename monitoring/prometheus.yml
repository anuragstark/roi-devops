global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: roi-platform

# Alertmanager integration
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# Alert rules
rule_files:
  - '/etc/prometheus/alert-rules.yml'

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: roi-backend
    metrics_path: /api/metrics
    ec2_sd_configs:
      - region: us-east-1
        port: 5000
    relabel_configs:
      - source_labels: [__meta_ec2_tag_Name]
        regex: roi-web-server
        action: keep
      - source_labels: [__meta_ec2_private_ip]
        target_label: instance

  - job_name: node-exporter
    ec2_sd_configs:
      - region: us-east-1
        port: 9100
    relabel_configs:
      - source_labels: [__meta_ec2_tag_Name]
        regex: roi-web-server|roi-monitoring-server
        action: keep
      - source_labels: [__meta_ec2_private_ip]
        target_label: instance

  - job_name: cadvisor
    ec2_sd_configs:
      - region: us-east-1
        port: 8080
    relabel_configs:
      - source_labels: [__meta_ec2_tag_Name]
        regex: roi-web-server|roi-monitoring-server
        action: keep
      - source_labels: [__meta_ec2_private_ip]
        target_label: instance
