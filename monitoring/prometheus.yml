global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: roi-platform

# Alertmanager integration
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# Alert rules
rule_files:
  - '/etc/prometheus/alert-rules.yml'

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: roi-backend
    metrics_path: /api/metrics
    static_configs:
      - targets: ['${WEB_PRIVATE_IP}:5000']

  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100', '${WEB_PRIVATE_IP}:9100']

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080', '${WEB_PRIVATE_IP}:8080']
